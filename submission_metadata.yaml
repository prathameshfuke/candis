ai_tools_used:
  - "Codex"

ai_usage_summary: |
  Used Codex to implement and debug the local rule-based ranker. No external APIs
  or candidate data are used during ranking.

methodology_summary: |
  CPU-only rule-based ranker that combines trust-weighted semantic skill groups,
  career trajectory analysis, honeypot detection, and Redrob behavioral signals.
  Final scoring is multiplicative: technical fit is reduced by poor career context
  or low availability, preventing keyword stuffers and inactive profiles from
  dominating the top ranks.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
